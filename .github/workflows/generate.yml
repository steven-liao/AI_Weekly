name: Generate Weekly Content

on:
  schedule:
    - cron: "0 1 * * 1"   # Every Monday 9:00 CST (1:00 UTC)

  workflow_dispatch:
    inputs:
      mode:
        description: "生成模式"
        required: true
        type: choice
        default: "pr"
        options:
          - pr            # Create PR for review (default)
          - direct-commit # Commit directly to main
          - dry-run       # Preview only
      date_from:
        description: "Start date (YYYY-MM-DD)"
        required: false
        type: string
      date_to:
        description: "End date (YYYY-MM-DD)"
        required: false
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Pipeline
        id: pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: |
          WEEK_START=$(date -d "last monday" +%Y-%m-%d 2>/dev/null || date -v-1m +%Y-%m-%d)
          ARGS="--run --output-dir output/${WEEK_START}"

          if [ "${{ inputs.mode }}" = "dry-run" ]; then
            ARGS="--dry-run"
          fi
          if [ -n "${{ inputs.date_from }}" ]; then
            ARGS="$ARGS --from ${{ inputs.date_from }}"
          fi
          if [ -n "${{ inputs.date_to }}" ]; then
            ARGS="$ARGS --to ${{ inputs.date_to }}"
          fi

          python -m ai_weekly.main $ARGS
          echo "week_start=${WEEK_START}" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ai-weekly-${{ steps.pipeline.outputs.week_start }}
          path: output/

      - name: Create PR (GitOps flow)
        if: inputs.mode == 'pr' || github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          WEEK_START=${{ steps.pipeline.outputs.week_start }}
          BRANCH="content/${WEEK_START}"
          git checkout -b "$BRANCH"
          git add "output/${WEEK_START}/"

          if git diff --staged --quiet; then
            echo "No new content to commit"
            exit 0
          fi

          git config user.name "ai-weekly-bot[bot]"
          git config user.email "bot@ai-weekly.local"
          git commit -m "content: AI Weekly ${WEEK_START}"
          git push -fu origin "$BRANCH"

          cat > pr-body.md << PRBODY
          ## AI Weekly Top 10 已生成

          ### 三版本对比

          | 算法 | 偏重 | 适合场景 |
          |------|------|---------|
          | 热度优先 | 社区讨论度 | 大家都在聊什么 |
          | 影响力优先 | 行业意义 | 什么改变了AI格局 |
          | 新鲜度优先 | 时效+新颖 | 本周最新动态 |

          请查看 [comparison.md](output/${WEEK_START}/comparison.md) 快速对比三个版本。

          ### 手动发布
          1. 从 output/${WEEK_START}/ 选择你满意的版本
          2. 下载对应目录下的图片
          3. 复制 xhs_text.md 文案
          4. 手动发布到小红书

          ### Merge 后自动打 tag 归档

          Generated by AI Weekly Bot
          PRBODY

          gh pr create \
            --title "AI Weekly ${WEEK_START} — 待审核" \
            --body-file pr-body.md

      - name: Direct commit (skip review)
        if: inputs.mode == 'direct-commit'
        run: |
          git config user.name "ai-weekly-bot[bot]"
          git config user.email "bot@ai-weekly.local"
          git add output/
          git diff --staged --quiet || git commit -m "content: AI Weekly ${{ steps.pipeline.outputs.week_start }} (auto)"
          git push
